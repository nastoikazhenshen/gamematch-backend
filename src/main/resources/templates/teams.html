<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Teams | GameMatch</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments :: nav}"></div>
<main class="page">
    <section class="page-header">
        <div>
            <p class="eyebrow">After response acceptance</p>
            <h1>My teams</h1>
        </div>
    </section>
    <div class="empty" th:if="${#lists.isEmpty(teams)}">No teams yet.</div>
    <table th:if="${!#lists.isEmpty(teams)}">
        <thead>
        <tr>
            <th>ID</th>
            <th>Game</th>
            <th>Members</th>
            <th>Created</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="team : ${teams}">
            <td><a th:href="@{/teams/{id}(id=${team.id})}" th:text="${team.id}">1</a></td>
            <td th:text="${team.gameName}">Game</td>
            <td>
                <span th:each="member, iter : ${team.members}"
                      th:text="${member.nickname + (iter.last ? '' : ', ')}">Nick</span>
            </td>
            <td>
                <time class="time-pill"
                      th:datetime="${#temporals.format(team.createdAt, 'yyyy-MM-dd''T''HH:mm:ss')}"
                      th:text="${#temporals.format(team.createdAt, 'dd.MM.yyyy HH:mm')}">
                    27.05.2026 20:00
                </time>
            </td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
