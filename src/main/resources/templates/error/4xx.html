<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Request error | GameMatch</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="error-page">
    <section class="error-panel">
        <p class="eyebrow" th:text="${status != null ? status : '4xx'}">4xx</p>
        <h1>Request failed</h1>
        <p class="muted" th:if="${message != null && !#strings.isEmpty(message)}" th:text="${message}">
            Check the data and try again.
        </p>
        <p class="muted" th:unless="${message != null && !#strings.isEmpty(message)}">
            Check the data and try again.
        </p>
        <dl class="details compact" th:if="${path != null}">
            <dt>Path</dt>
            <dd th:text="${path}">/path</dd>
        </dl>
        <div class="error-actions">
            <a class="button primary" th:href="@{/dashboard}">Dashboard</a>
            <a class="button ghost" th:href="@{/requests}">Requests</a>
            <a class="button ghost" th:href="@{/login}">Log in</a>
        </div>
    </section>
</main>
</body>
</html>
