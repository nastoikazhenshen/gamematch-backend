<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Page not found | GameMatch</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="error-page">
    <section class="error-panel">
        <p class="eyebrow">404</p>
        <h1>Page not found</h1>
        <p class="muted">
            This page does not exist or the link is outdated. Check the address or return to GameMatch sections.
        </p>
        <dl class="details compact" th:if="${path != null}">
            <dt>Path</dt>
            <dd th:text="${path}">/path</dd>
        </dl>
        <div class="error-actions">
            <a class="button primary" th:href="@{/dashboard}">Dashboard</a>
            <a class="button ghost" th:href="@{/requests}">Requests</a>
            <a class="button ghost" th:href="@{/login}">Log in</a>
        </div>
    </section>
</main>
</body>
</html>
