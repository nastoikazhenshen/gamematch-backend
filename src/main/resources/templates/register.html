<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registration | GameMatch</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="auth-page">
<main class="auth-shell">
    <section class="auth-panel">
        <p class="eyebrow">GameMatch</p>
        <h1>Registration</h1>
        <div th:replace="~{fragments :: alerts}"></div>
        <form th:action="@{/register}" method="post" class="form-stack">
            <label>Email
                <input type="email" name="email" required autocomplete="email">
            </label>
            <label>Nickname
                <input type="text" name="nickname" required minlength="3" maxlength="80">
            </label>
            <label>Password
                <input type="password" name="password" required minlength="6" maxlength="100" autocomplete="new-password">
            </label>
            <button type="submit" class="button primary">Create account</button>
        </form>
        <p class="muted">Already have an account? <a th:href="@{/login}">Log in</a></p>
    </section>
</main>
</body>
</html>
