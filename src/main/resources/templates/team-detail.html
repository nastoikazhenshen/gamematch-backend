<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="'Team #' + ${team.id} + ' | GameMatch'">Team | GameMatch</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments :: nav}"></div>
<main class="page">
    <div th:replace="~{fragments :: alerts}"></div>
    <section class="page-header">
        <div>
            <p class="eyebrow" th:text="${team.gameName}">Game</p>
            <h1 th:text="'Team #' + ${team.id}">Team</h1>
        </div>
        <div class="actions">
            <form th:if="${team.completedAt == null}" th:action="@{/teams/{id}/complete(id=${team.id})}" method="post">
                <button type="submit" class="button primary">Complete match</button>
            </form>
            <span class="time-pill" th:if="${team.completedAt != null}"
                  th:text="${'Match completed ' + #temporals.format(team.completedAt, 'dd.MM.yyyy HH:mm')}">
                Match completed
            </span>
            <a class="button ghost" th:href="@{/requests/{id}(id=${team.requestId})}">Back to request</a>
        </div>
    </section>

    <section class="split">
        <div class="panel">
            <h2>Members</h2>
            <ul class="member-list">
                <li th:each="member : ${team.members}">
                    <a th:href="@{/profiles/search(nickname=${member.nickname})}" th:text="${member.nickname}">Nick</a>
                </li>
            </ul>
        </div>

        <div class="panel">
            <h2>Teammate review</h2>
            <p class="empty" th:if="${team.completedAt == null}">Reviews are available after the match is completed.</p>
            <form th:if="${team.completedAt != null}" th:action="@{/teams/{id}/reviews(id=${team.id})}" method="post" class="form-stack">
                <label>Teammate
                    <select name="reviewedUserId" required>
                        <option value="">Choose player</option>
                        <option th:each="member : ${team.members}"
                                th:if="${member.userId != currentUserId}"
                                th:value="${member.userId}"
                                th:text="${member.nickname}">
                            Nick
                        </option>
                    </select>
                </label>
                <label>Rating
                    <select name="stars" required>
                        <option value="5">5 stars</option>
                        <option value="4">4 stars</option>
                        <option value="3">3 stars</option>
                        <option value="2">2 stars</option>
                        <option value="1">1 star</option>
                    </select>
                </label>
                <label>Review
                    <textarea name="comment" rows="4" maxlength="1000" placeholder="How did the match go?"></textarea>
                </label>
                <button type="submit" class="button primary">Save review</button>
            </form>
        </div>
    </section>

    <section class="split">
        <div class="panel">
            <h2>Team reviews</h2>
            <p class="empty" th:if="${#lists.isEmpty(reviews)}">No reviews yet.</p>
            <div class="review-list" th:if="${!#lists.isEmpty(reviews)}">
                <article class="review-card" th:each="review : ${reviews}">
                    <header>
                        <strong th:text="${review.reviewedUserNickname}">Player</strong>
                        <span class="stars" th:text="${review.stars + ' / 5'}">5 / 5</span>
                    </header>
                    <p class="muted" th:text="${'From ' + review.reviewerNickname}">From Nick</p>
                    <p th:if="${review.comment != null}" th:text="${review.comment}">Comment</p>
                </article>
            </div>
        </div>

        <div class="panel chat-panel">
            <h2>Chat</h2>
            <div class="chat-log">
                <div class="empty" th:if="${#lists.isEmpty(messages)}">No messages yet.</div>
                <article class="message" th:each="message : ${messages}">
                    <header>
                        <strong th:text="${message.senderNickname}">Nick</strong>
                        <time th:datetime="${#temporals.format(message.createdAt, 'yyyy-MM-dd''T''HH:mm:ss')}"
                              th:text="${#temporals.format(message.createdAt, 'dd.MM.yyyy HH:mm')}">
                            27.05.2026 20:00
                        </time>
                    </header>
                    <p th:text="${message.content}">Message</p>
                </article>
            </div>
            <form th:action="@{/teams/{id}/messages(id=${team.id})}" method="post" class="message-form">
                <textarea name="content" rows="3" maxlength="2000" required placeholder="Message"></textarea>
                <button type="submit" class="button primary">Send</button>
            </form>
        </div>
    </section>
</main>
</body>
</html>
