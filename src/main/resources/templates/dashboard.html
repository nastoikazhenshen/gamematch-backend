<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Кабинет | GameMatch</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments :: nav}"></div>
<main class="page">
    <div th:replace="~{fragments :: alerts}"></div>
    <section class="page-header">
        <div>
            <p class="eyebrow">Личный кабинет</p>
            <h1 th:text="${profile.nickname}">Nickname</h1>
        </div>
        <a class="button primary" th:href="@{/requests/new}">Новая заявка</a>
    </section>

    <section class="stats-grid">
        <article class="stat">
            <span>Karma</span>
            <strong th:text="${profile.karma}">0</strong>
        </article>
        <article class="stat">
            <span>Сыграно матчей</span>
            <strong th:text="${profile.completedMatches}">0</strong>
        </article>
        <article class="stat">
            <span>Часовой пояс</span>
            <strong th:text="${profile.timezone != null ? profile.timezone : '-'}">-</strong>
        </article>
    </section>

    <section class="split">
        <div>
            <div class="section-title">
                <h2>Мои заявки</h2>
                <a th:href="@{/requests/my}">Все</a>
            </div>
            <div class="empty" th:if="${#lists.isEmpty(myRequests)}">Заявок пока нет.</div>
            <table th:if="${!#lists.isEmpty(myRequests)}">
                <thead><tr><th>Название</th><th>Игра</th><th>Статус</th></tr></thead>
                <tbody>
                <tr th:each="request : ${myRequests}">
                    <td><a th:href="@{/requests/{id}(id=${request.id})}" th:text="${request.title}">Title</a></td>
                    <td th:text="${request.gameName}">Game</td>
                    <td><span class="badge" th:text="${request.status}">ACTIVE</span></td>
                </tr>
                </tbody>
            </table>
        </div>
        <div>
            <div class="section-title">
                <h2>Команды</h2>
                <a th:href="@{/teams}">Все</a>
            </div>
            <div class="empty" th:if="${#lists.isEmpty(myTeams)}">Команды появятся после принятия отклика.</div>
            <table th:if="${!#lists.isEmpty(myTeams)}">
                <thead><tr><th>ID</th><th>Игра</th><th>Участники</th></tr></thead>
                <tbody>
                <tr th:each="team : ${myTeams}">
                    <td><a th:href="@{/teams/{id}(id=${team.id})}" th:text="${team.id}">1</a></td>
                    <td th:text="${team.gameName}">Game</td>
                    <td th:text="${#lists.size(team.members)}">2</td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>
</body>
</html>
