<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My profile | GameMatch</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments :: nav}"></div>
<main class="page narrow">
    <div th:replace="~{fragments :: alerts}"></div>
    <section class="page-header">
        <div>
            <p class="eyebrow">Player profile</p>
            <h1 th:text="${profile.nickname}">Nickname</h1>
            <p class="karma-line">Karma: <strong th:text="${profile.karma}">0</strong></p>
        </div>
    </section>
    <section class="panel">
        <form th:action="@{/profiles/me}" method="post" class="form-grid">
            <label>Nickname
                <input type="text" name="nickname" minlength="3" maxlength="80" th:value="${profile.nickname}">
            </label>
            <label>Timezone
                <select name="timezone">
                    <option value="">Not selected</option>
                    <option th:each="timezone : ${timezones}"
                            th:value="${timezone}"
                            th:text="${timezone}"
                            th:selected="${timezone == profile.timezone}">
                        Asia/Qyzylorda
                    </option>
                </select>
            </label>
            <label class="full">Average play time
                <span class="time-range">
                    <select name="playTimeFrom">
                        <option value="">Start</option>
                        <option th:each="time : ${playTimeOptions}"
                                th:value="${time}"
                                th:text="${time}"
                                th:selected="${time == playTimeFrom}">
                            19:00
                        </option>
                    </select>
                    <select name="playTimeTo">
                        <option value="">End</option>
                        <option th:each="time : ${playTimeOptions}"
                                th:value="${time}"
                                th:text="${time}"
                                th:selected="${time == playTimeTo}">
                            23:00
                        </option>
                    </select>
                </span>
            </label>
            <label class="full">About me
                <textarea name="bio" rows="5" maxlength="1000" th:text="${profile.bio}"></textarea>
            </label>
            <button type="submit" class="button primary">Save</button>
        </form>
    </section>

    <section class="stats-grid compact-stats">
        <article class="stat">
            <span>Karma</span>
            <strong th:text="${profile.karma}">0</strong>
        </article>
        <article class="stat">
            <span>Matches through service</span>
            <strong th:text="${stats.playedMatches}">0</strong>
        </article>
        <article class="stat">
            <span>Accepted responses</span>
            <strong th:text="${stats.acceptedResponses + ' / ' + stats.sentResponses}">0 / 0</strong>
        </article>
        <article class="stat">
            <span>Acceptance rate</span>
            <strong th:text="${stats.acceptedResponseRate + '%'}">0%</strong>
        </article>
        <article class="stat">
            <span>Requests created</span>
            <strong th:text="${stats.authoredRequests}">0</strong>
        </article>
    </section>

    <section class="panel stack">
        <div class="section-title">
            <h2>Profile games</h2>
        </div>

        <p class="empty" th:if="${playerGames == null || #lists.isEmpty(playerGames)}">No games added yet.</p>

        <div class="profile-game-list" th:if="${playerGames != null && !#lists.isEmpty(playerGames)}">
            <article class="game-card" th:each="playerGame : ${playerGames}">
                <div class="game-summary">
                    <img class="rank-preview"
                         th:if="${playerGame.rankImageUrl != null}"
                         th:src="${playerGame.rankImageUrl}"
                         th:alt="${playerGame.rank}">
                    <div>
                        <strong th:text="${playerGame.gameName}">Dota 2</strong>
                        <span class="muted" th:text="${playerGame.rank != null ? playerGame.rank : 'Rank not specified'}">Rank</span>
                        <span class="badge" th:if="${playerGame.mainRole != null}" th:text="${playerGame.mainRole}">Role</span>
                    </div>
                </div>

                <form th:action="@{/profiles/me/games/{id}(id=${playerGame.id})}" method="post" class="form-grid compact">
                    <input type="hidden" name="gameId" th:value="${playerGame.gameId}">
                    <label>Rank
                        <span class="rank-picker">
                            <select name="rank"
                                    th:id="${'rank-' + playerGame.id}"
                                    data-profile-rank-select
                                    th:attr="data-profile-fixed-game-id=${playerGame.gameId}">
                                <option value="">No rank</option>
                                <option th:each="rank : ${ranks}"
                                        th:value="${rank.name}"
                                        th:text="${rank.name}"
                                        th:selected="${rank.game.id == playerGame.gameId and rank.name == playerGame.rank}"
                                        th:data-game-id="${rank.game.id}"
                                        th:data-image-url="${rank.imageUrl}">
                                    Rank
                                </option>
                            </select>
                            <img class="rank-preview"
                                 th:attr="data-profile-rank-preview-for=${'rank-' + playerGame.id}"
                                 alt=""
                                 hidden>
                        </span>
                    </label>
                    <label>Main role
                        <input type="text" name="mainRole" maxlength="80" th:value="${playerGame.mainRole}" placeholder="Support, Entry, Duelist">
                    </label>
                    <div class="actions full">
                        <button type="submit" class="button primary small">Update</button>
                    </div>
                </form>
                <form th:action="@{/profiles/me/games/{id}/delete(id=${playerGame.id})}" method="post">
                    <button type="submit" class="button danger small">Delete</button>
                </form>
            </article>
        </div>
    </section>

    <section class="panel">
        <div class="section-title">
            <h2>Add game</h2>
        </div>
        <form th:action="@{/profiles/me/games}" method="post" class="form-grid compact">
            <label>Game
                <select id="profile-game-id" name="gameId" data-profile-game-select required>
                    <option value="">Choose game</option>
                    <option th:each="game : ${games}" th:value="${game.id}" th:text="${game.name}">Game</option>
                </select>
            </label>
            <label>Rank
                <span class="rank-picker">
                    <select id="profile-rank" name="rank" data-profile-rank-select data-profile-game-source="profile-game-id">
                        <option value="">No rank</option>
                        <option th:each="rank : ${ranks}"
                                th:value="${rank.name}"
                                th:text="${rank.name}"
                                th:data-game-id="${rank.game.id}"
                                th:data-image-url="${rank.imageUrl}">
                            Rank
                        </option>
                    </select>
                    <img class="rank-preview" data-profile-rank-preview-for="profile-rank" alt="" hidden>
                </span>
            </label>
            <label class="full">Main role
                <input type="text" name="mainRole" maxlength="80" placeholder="Support, Entry, Duelist">
            </label>
            <button type="submit" class="button primary">Add</button>
        </form>
    </section>

    <section class="panel">
        <div class="section-title">
            <h2>My reviews</h2>
        </div>
        <p class="empty" th:if="${reviews == null || #lists.isEmpty(reviews)}">No reviews yet.</p>
        <div class="review-list" th:if="${reviews != null && !#lists.isEmpty(reviews)}">
            <article class="review-card" th:each="review : ${reviews}">
                <header>
                    <strong th:text="${review.stars + ' / 5'}">5 / 5</strong>
                    <span th:text="${#temporals.format(review.createdAt, 'dd.MM.yyyy')}">27.05.2026</span>
                </header>
                <p class="muted" th:text="${'From ' + review.reviewerNickname}">From Nick</p>
                <p th:if="${review.comment != null}" th:text="${review.comment}">Comment</p>
            </article>
        </div>
    </section>
</main>
<script th:src="@{/js/profile-games.js}"></script>
</body>
</html>
