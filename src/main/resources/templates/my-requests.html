<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My requests | GameMatch</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments :: nav}"></div>
<main class="page">
    <div th:replace="~{fragments :: alerts}"></div>
    <section class="page-header">
        <div>
            <p class="eyebrow">Personal cabinet</p>
            <h1>My requests</h1>
        </div>
        <a class="button primary" th:href="@{/requests/new}">Create</a>
    </section>
    <div class="empty" th:if="${#lists.isEmpty(requests)}">You have not created any requests yet.</div>
    <table th:if="${!#lists.isEmpty(requests)}">
        <thead><tr><th>Title</th><th>Game</th><th>Role</th><th>Time</th><th>Status</th></tr></thead>
        <tbody>
        <tr th:each="request : ${requests}">
            <td><a th:href="@{/requests/{id}(id=${request.id})}" th:text="${request.title}">Title</a></td>
            <td th:text="${request.gameName}">Game</td>
            <td th:text="${request.requiredRole != null ? request.requiredRole : '-'}">-</td>
            <td>
                <time th:if="${request.desiredPlayTime != null}"
                      th:datetime="${request.desiredPlayTime}"
                      th:text="${#temporals.format(request.desiredPlayTime, 'dd.MM.yyyy HH:mm')}">24.05.2026 20:00</time>
                <span th:unless="${request.desiredPlayTime != null}">-</span>
            </td>
            <td><span class="badge" th:text="${request.status}">ACTIVE</span></td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
