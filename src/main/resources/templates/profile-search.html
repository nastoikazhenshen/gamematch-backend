<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Игроки | GameMatch</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments :: nav}"></div>
<main class="page narrow">
    <div th:replace="~{fragments :: alerts}"></div>
    <section class="page-header">
        <div>
            <p class="eyebrow">Поиск</p>
            <h1>Игроки</h1>
        </div>
    </section>
    <form th:action="@{/profiles/search}" method="get" class="toolbar">
        <input type="text" name="nickname" th:value="${query}" placeholder="Никнейм">
        <button type="submit" class="button primary">Найти</button>
    </form>

    <section class="panel" th:if="${profile != null}">
        <h2><a th:href="@{/profiles/{id}(id=${profile.id})}" th:text="${profile.nickname}">Nickname</a></h2>
        <dl class="details">
            <dt>Email</dt><dd th:text="${profile.email}">email</dd>
            <dt>Karma</dt><dd th:text="${profile.karma}">0</dd>
            <dt>Матчи</dt><dd th:text="${stats.playedMatches}">0</dd>
            <dt>Принятие откликов</dt><dd th:text="${stats.acceptedResponseRate + '%'}">0%</dd>
            <dt>Отклики</dt><dd th:text="${stats.acceptedResponses + ' / ' + stats.sentResponses}">0 / 0</dd>
            <dt>Время</dt><dd th:text="${profile.averagePlayTime != null ? profile.averagePlayTime : '-'}">-</dd>
        </dl>

        <div class="section-title inner">
            <h2>Игры</h2>
        </div>
        <p class="empty" th:if="${playerGames == null || #lists.isEmpty(playerGames)}">Игры не указаны.</p>
        <div class="profile-game-list readonly" th:if="${playerGames != null && !#lists.isEmpty(playerGames)}">
            <article class="game-card" th:each="playerGame : ${playerGames}">
                <div class="game-summary">
                    <img class="rank-preview"
                         th:if="${playerGame.rankImageUrl != null}"
                         th:src="${playerGame.rankImageUrl}"
                         th:alt="${playerGame.rank}">
                    <div>
                        <strong th:text="${playerGame.gameName}">Dota 2</strong>
                        <span class="muted" th:text="${playerGame.rank != null ? playerGame.rank : 'Ранг не указан'}">Rank</span>
                        <span class="badge" th:if="${playerGame.mainRole != null}" th:text="${playerGame.mainRole}">Role</span>
                    </div>
                </div>
            </article>
        </div>
    </section>

    <section class="panel">
        <div class="section-title">
            <h2>Предложенные игроки</h2>
        </div>
        <p class="empty" th:if="${suggestedPlayers == null || #lists.isEmpty(suggestedPlayers)}">Пока нет игроков для рекомендации.</p>
        <table th:if="${suggestedPlayers != null && !#lists.isEmpty(suggestedPlayers)}">
            <thead>
            <tr>
                <th>Игрок</th>
                <th>Заявки</th>
                <th>Karma</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="player : ${suggestedPlayers}">
                <td><a th:href="@{/profiles/{id}(id=${player.profileId})}" th:text="${player.nickname}">Nickname</a></td>
                <td th:text="${player.requestCount}">0</td>
                <td th:text="${player.karma}">0</td>
            </tr>
            </tbody>
        </table>
    </section>
</main>
</body>
</html>
