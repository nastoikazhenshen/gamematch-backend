<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="'Команда #' + ${team.id} + ' | GameMatch'">Команда | GameMatch</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments :: nav}"></div>
<main class="page">
    <div th:replace="~{fragments :: alerts}"></div>
    <section class="page-header">
        <div>
            <p class="eyebrow" th:text="${team.gameName}">Game</p>
            <h1 th:text="'Команда #' + ${team.id}">Команда</h1>
        </div>
        <div class="actions">
            <form th:if="${team.completedAt == null}" th:action="@{/teams/{id}/complete(id=${team.id})}" method="post">
                <button type="submit" class="button primary">Завершить матч</button>
            </form>
            <span class="time-pill" th:if="${team.completedAt != null}"
                  th:text="${'Матч завершен ' + #temporals.format(team.completedAt, 'dd.MM.yyyy в HH:mm')}">
                Матч завершен
            </span>
            <a class="button ghost" th:href="@{/requests/{id}(id=${team.requestId})}">К заявке</a>
        </div>
    </section>

    <section class="split">
        <div class="panel">
            <h2>Участники</h2>
            <ul class="member-list">
                <li th:each="member : ${team.members}">
                    <a th:href="@{/profiles/search(nickname=${member.nickname})}" th:text="${member.nickname}">Nick</a>
                </li>
            </ul>
        </div>

        <div class="panel">
            <h2>Оценка тиммейта</h2>
            <p class="empty" th:if="${team.completedAt == null}">Оценки откроются после завершения матча.</p>
            <form th:if="${team.completedAt != null}" th:action="@{/teams/{id}/reviews(id=${team.id})}" method="post" class="form-stack">
                <label>Тиммейт
                    <select name="reviewedUserId" required>
                        <option value="">Выберите игрока</option>
                        <option th:each="member : ${team.members}"
                                th:if="${member.userId != currentUserId}"
                                th:value="${member.userId}"
                                th:text="${member.nickname}">
                            Nick
                        </option>
                    </select>
                </label>
                <label>Оценка
                    <select name="stars" required>
                        <option value="5">5 звезд</option>
                        <option value="4">4 звезды</option>
                        <option value="3">3 звезды</option>
                        <option value="2">2 звезды</option>
                        <option value="1">1 звезда</option>
                    </select>
                </label>
                <label>Отзыв
                    <textarea name="comment" rows="4" maxlength="1000" placeholder="Как прошла игра?"></textarea>
                </label>
                <button type="submit" class="button primary">Сохранить оценку</button>
            </form>
        </div>
    </section>

    <section class="split">
        <div class="panel">
            <h2>Отзывы команды</h2>
            <p class="empty" th:if="${#lists.isEmpty(reviews)}">Отзывов пока нет.</p>
            <div class="review-list" th:if="${!#lists.isEmpty(reviews)}">
                <article class="review-card" th:each="review : ${reviews}">
                    <header>
                        <strong th:text="${review.reviewedUserNickname}">Player</strong>
                        <span class="stars" th:text="${review.stars + ' / 5'}">5 / 5</span>
                    </header>
                    <p class="muted" th:text="${'От ' + review.reviewerNickname}">От Nick</p>
                    <p th:if="${review.comment != null}" th:text="${review.comment}">Comment</p>
                </article>
            </div>
        </div>

        <div class="panel chat-panel">
            <h2>Чат</h2>
            <div class="chat-log">
                <div class="empty" th:if="${#lists.isEmpty(messages)}">Сообщений пока нет.</div>
                <article class="message" th:each="message : ${messages}">
                    <header>
                        <strong th:text="${message.senderNickname}">Nick</strong>
                        <time th:datetime="${#temporals.format(message.createdAt, 'yyyy-MM-dd''T''HH:mm:ss')}"
                              th:text="${#temporals.format(message.createdAt, 'dd.MM.yyyy в HH:mm')}">
                            27.05.2026 в 20:00
                        </time>
                    </header>
                    <p th:text="${message.content}">Message</p>
                </article>
            </div>
            <form th:action="@{/teams/{id}/messages(id=${team.id})}" method="post" class="message-form">
                <textarea name="content" rows="3" maxlength="2000" required placeholder="Сообщение"></textarea>
                <button type="submit" class="button primary">Отправить</button>
            </form>
        </div>
    </section>
</main>
</body>
</html>
