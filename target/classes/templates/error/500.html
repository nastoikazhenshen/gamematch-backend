<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ошибка сервера | GameMatch</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="error-page">
    <section class="error-panel">
        <p class="eyebrow">500</p>
        <h1>Ошибка сервера</h1>
        <p class="muted" th:if="${message != null && !#strings.isEmpty(message)}" th:text="${message}">
            Запрос не удалось обработать.
        </p>
        <p class="muted" th:unless="${message != null && !#strings.isEmpty(message)}">
            Запрос не удалось обработать. Можно вернуться в кабинет или повторить действие позже.
        </p>
        <dl class="details compact" th:if="${path != null}">
            <dt>Путь</dt>
            <dd th:text="${path}">/path</dd>
        </dl>
        <div class="error-actions">
            <a class="button primary" th:href="@{/dashboard}">В кабинет</a>
            <a class="button ghost" th:href="@{/requests}">К заявкам</a>
            <a class="button ghost" th:href="@{/login}">Войти заново</a>
        </div>
    </section>
</main>
</body>
</html>
